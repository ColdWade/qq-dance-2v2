<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QQ炫舞 - 双人对战模式</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Arial',sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;user-select:none;position:relative}
canvas{display:block}
#startScreen{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;color:#fff;text-align:center}
#startScreen h1{font-size:52px;background:linear-gradient(135deg,#ff6fd8,#3813c2,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;letter-spacing:4px}
#startScreen .subtitle{font-size:18px;color:#aaa;margin-bottom:40px}
#startBtn{padding:16px 60px;font-size:22px;border:none;border-radius:50px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;cursor:pointer;transition:all .3s;letter-spacing:2px;box-shadow:0 4px 20px rgba(102,126,234,.4)}
#startBtn:hover{transform:scale(1.08);box-shadow:0 6px 30px rgba(102,126,234,.6)}
.difficulty-section{margin-bottom:30px}
.difficulty-label{font-size:15px;color:#99aabb;margin-bottom:14px;letter-spacing:1px}
.difficulty-btns{display:flex;gap:14px;justify-content:center}
.diff-btn{padding:10px 26px;font-size:15px;border:2px solid rgba(100,120,200,0.3);border-radius:30px;background:rgba(30,35,70,0.6);color:#8899bb;cursor:pointer;transition:all .3s;letter-spacing:1px;position:relative;overflow:hidden}
.diff-btn:hover{border-color:rgba(100,140,255,0.5);color:#aabbdd;background:rgba(40,50,90,0.8)}
.diff-btn.selected{border-color:transparent;color:#fff;font-weight:bold}
.diff-btn.easy.selected{background:linear-gradient(135deg,#44cc88,#22aa66);box-shadow:0 2px 16px rgba(68,204,136,0.4)}
.diff-btn.normal.selected{background:linear-gradient(135deg,#4488ff,#3366dd);box-shadow:0 2px 16px rgba(68,136,255,0.4)}
.diff-btn.hard.selected{background:linear-gradient(135deg,#ff4466,#cc2244);box-shadow:0 2px 16px rgba(255,68,102,0.4)}
.diff-desc{font-size:12px;color:#667;margin-top:10px;min-height:18px;transition:all .3s}
.controls-info{margin-top:24px;font-size:14px;color:#777;line-height:2}
.controls-info span{color:#aaddff}
#cardOverlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,25,0.92);backdrop-filter:blur(8px)}
#cardOverlay.show{display:flex}
.card-title{font-size:32px;font-weight:bold;background:linear-gradient(135deg,#ff9a56,#ff6fd8,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;letter-spacing:3px}
.card-subtitle{font-size:14px;color:#8899bb;margin-bottom:30px}
.card-timer-bar{width:340px;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin-bottom:28px;overflow:hidden}
.card-timer-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#ff4466,#ff9944,#ffdd44);transition:width 0.1s linear;box-shadow:0 0 10px rgba(255,150,80,0.5)}
.card-timer-text{font-size:16px;color:#ffcc66;margin-bottom:6px;font-weight:bold}
.card-container{display:flex;gap:24px;perspective:1000px}
.card-item{width:200px;min-height:260px;border-radius:16px;padding:20px 16px;cursor:pointer;position:relative;overflow:hidden;transition:all .35s cubic-bezier(.34,1.56,.64,1);border:2px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;align-items:center;text-align:center}
.card-item:hover{transform:translateY(-14px) scale(1.04);border-color:rgba(255,255,255,0.35);box-shadow:0 16px 40px rgba(0,0,0,0.5)}
.card-item.selected{transform:translateY(-14px) scale(1.06);border-color:#ffcc44;box-shadow:0 0 30px rgba(255,200,60,0.4)}
.card-item .card-rarity{font-size:10px;letter-spacing:2px;font-weight:bold;padding:3px 10px;border-radius:10px;position:absolute;top:10px;right:10px}
.card-item .card-icon{font-size:44px;margin:18px 0 12px}
.card-item .card-name{font-size:17px;font-weight:bold;color:#fff;margin-bottom:8px}
.card-item .card-desc{font-size:12px;color:rgba(255,255,255,0.7);line-height:1.6;flex:1}
.card-desc .cv{font-style:normal;color:#ffdd44;font-weight:bold;text-shadow:0 0 6px rgba(255,220,60,0.5)}
.card-desc .ck{font-style:normal;color:#66ddff;font-weight:bold;text-shadow:0 0 6px rgba(100,220,255,0.4)}
.card-desc .cn{font-style:normal;color:#ff7788;font-weight:bold;text-shadow:0 0 6px rgba(255,100,120,0.4)}
.card-item .card-duration{font-size:11px;color:rgba(255,255,255,0.45);margin-top:8px;font-style:italic}
.card-item .card-key{margin-top:12px;font-size:13px;padding:4px 16px;border-radius:6px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7)}
.card-common{background:linear-gradient(165deg,rgba(40,55,90,0.95),rgba(25,35,65,0.98))}
.card-common .card-rarity{background:rgba(100,140,200,0.3);color:#88aadd}
.card-rare{background:linear-gradient(165deg,rgba(50,35,90,0.95),rgba(35,25,75,0.98))}
.card-rare .card-rarity{background:rgba(160,100,255,0.3);color:#bb88ff}
.card-epic{background:linear-gradient(165deg,rgba(90,45,30,0.95),rgba(70,25,40,0.98))}
.card-epic .card-rarity{background:rgba(255,130,60,0.3);color:#ff9944}
.card-legendary{background:linear-gradient(165deg,rgba(90,75,20,0.95),rgba(70,55,15,0.98));box-shadow:0 0 20px rgba(255,200,60,0.15)}
.card-legendary .card-rarity{background:rgba(255,200,60,0.3);color:#ffcc44}
.card-perm{background:linear-gradient(165deg,rgba(20,60,60,0.95),rgba(10,45,50,0.98));border:2px solid rgba(0,255,200,0.3);box-shadow:0 0 25px rgba(0,255,180,0.2)}
.card-perm .card-rarity{background:rgba(0,255,180,0.3);color:#44ffcc}
.card-perm::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,transparent,rgba(0,255,200,0.05),transparent);pointer-events:none}
.card-hint{font-size:12px;color:#556;margin-top:24px}
.card-active-list{position:fixed;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:50;pointer-events:none;flex-wrap:wrap;justify-content:center;max-width:80%}
.card-active-tag{padding:3px 10px;border-radius:10px;font-size:10px;font-weight:bold;opacity:0.85;white-space:nowrap}
</style>
</head>
<body>
<div id="startScreen">
  <h1>QQ炫舞</h1>
  <div class="subtitle">双 人 对 战 模 式</div>
  <div class="difficulty-section">
    <div class="difficulty-label">选择电脑玩家难度</div>
    <div class="difficulty-btns">
      <button class="diff-btn easy" data-diff="easy" onclick="selectDiff('easy')">简 单</button>
      <button class="diff-btn normal selected" data-diff="normal" onclick="selectDiff('normal')">普 通</button>
      <button class="diff-btn hard" data-diff="hard" onclick="selectDiff('hard')">困 难</button>
    </div>
    <div class="diff-desc" id="diffDesc">电脑玩家会偶尔失误，适合休闲对战</div>
  </div>
  <button id="startBtn">开始对战</button>
  <div class="controls-info">
    <span>↑ ↓ ← →</span> 输入方向音符 &nbsp;|&nbsp; <span>空格</span> 关键音（节拍器踩点）<br>
    你控制左半屏，电脑玩家控制右半屏，比拼谁的分数更高！
  </div>
</div>
<div id="cardOverlay">
  <div class="card-title">✦ 命运抉择 ✦</div>
  <div class="card-subtitle">选择一张卡牌强化你的下一阶段表现</div>
  <div class="card-timer-text" id="cardTimerText">10</div>
  <div class="card-timer-bar"><div class="card-timer-fill" id="cardTimerFill" style="width:100%"></div></div>
  <div class="card-container" id="cardContainer"></div>
  <div class="card-hint">按 <span style="color:#aaddff">1</span> / <span style="color:#aaddff">2</span> / <span style="color:#aaddff">3</span> 快速选牌，或点击卡牌</div>
</div>
<div class="card-active-list" id="activeCards"></div>
<canvas id="gameCanvas"></canvas>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),DPR=window.devicePixelRatio||1;
function resizeCanvas(){canvas.width=window.innerWidth*DPR;canvas.height=window.innerHeight*DPR;canvas.style.width=window.innerWidth+'px';canvas.style.height=window.innerHeight+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
resizeCanvas();window.addEventListener('resize',resizeCanvas);
const W=()=>window.innerWidth,H=()=>window.innerHeight,HALF_W=()=>W()/2;
const BPM=120,BEAT_MS=60000/BPM,MEASURE_MS=BEAT_MS*4;
const DIR_MAP={'ArrowUp':'↑','ArrowDown':'↓','ArrowLeft':'←','ArrowRight':'→'};
const DIR_KEYS=['↑','↓','←','→'];
const JUDGE_PERFECT=50,JUDGE_GREAT=100,JUDGE_GOOD=150,JUDGE_BAD=200;
const TRACK_DURATION=MEASURE_MS,JUDGE_LINE_RATIO=4/5;

let gameState='idle',currentRound=0,totalRounds=20,rounds=[];
let gameStartTime=0,roundStartTime=0,beatCount=0,lastBeatTime=0,beatFlash=0,keyBeatFlash=0;

// ========== Roguelike Card System ==========
const CARD_INTERVAL=4,CARD_TIMER_S=10;
let cardState='idle',cardTimer=0,cardStartT=0,cardChoices=[],cardPickIdx=-1;
let pCards=[],cCards=[];
const ALL_CARDS=[
  {id:'s10',name:'分数加成',icon:'💰',rarity:'common',rl:'普通',desc:'接下来<em class="cv">5</em>回合<em class="ck">判定分数</em>+<em class="cv">10%</em>',dur:5,eff:{t:'sMult',v:1.1},css:'card-common'},
  {id:'cshield',name:'连击护盾',icon:'🛡️',rarity:'common',rl:'普通',desc:'接下来<em class="cv">5</em>回合首次断连<em class="ck">不清零combo</em>',dur:5,eff:{t:'cShield',v:1},css:'card-common'},
  {id:'jwS',name:'宽容之心',icon:'💝',rarity:'common',rl:'普通',desc:'接下来<em class="cv">5</em>回合<em class="ck">判定窗口</em>扩大<em class="cv">15%</em>',dur:5,eff:{t:'jWiden',v:0.15},css:'card-common'},
  {id:'sTrack',name:'时光减速',icon:'⏳',rarity:'common',rl:'普通',desc:'接下来<em class="cv">5</em>回合<em class="ck">音轨速度</em>减慢<em class="cv">10%</em>',dur:5,eff:{t:'tSlow',v:0.10},css:'card-common'},
  {id:'inst300',name:'即时奖励',icon:'🎁',rarity:'common',rl:'普通',desc:'立即获得<em class="cv">300</em>分',dur:0,eff:{t:'instS',v:300},css:'card-common'},
  {id:'s25',name:'暴富符咒',icon:'💎',rarity:'rare',rl:'稀有',desc:'接下来<em class="cv">5</em>回合<em class="ck">判定分数</em>+<em class="cv">25%</em>',dur:5,eff:{t:'sMult',v:1.25},css:'card-rare'},
  {id:'pChain',name:'完美连锁',icon:'⚡',rarity:'rare',rl:'稀有',desc:'接下来<em class="cv">5</em>回合<em class="ck">PERFECT</em>额外+<em class="cv">200</em>分',dur:5,eff:{t:'pBonus',v:200},css:'card-rare'},
  {id:'autoF',name:'自动起手',icon:'🤖',rarity:'rare',rl:'稀有',desc:'接下来<em class="cv">5</em>回合自动输入前<em class="cv">2</em>个音符',dur:5,eff:{t:'autoIn',v:2},css:'card-rare'},
  {id:'jwB',name:'大慈大悲',icon:'🌟',rarity:'rare',rl:'稀有',desc:'接下来<em class="cv">5</em>回合<em class="ck">判定窗口</em>扩大<em class="cv">30%</em>',dur:5,eff:{t:'jWiden',v:0.30},css:'card-rare'},
  {id:'cBoost',name:'连击催化',icon:'🔥',rarity:'rare',rl:'稀有',desc:'接下来<em class="cv">5</em>回合<em class="ck">combo加成</em>翻倍',dur:5,eff:{t:'cBoost',v:2},css:'card-rare'},
  {id:'cpuD',name:'干扰电波',icon:'📡',rarity:'rare',rl:'稀有',desc:'接下来<em class="cv">5</em>回合对手<em class="ck">准确率</em><em class="cn">-15%</em>',dur:5,eff:{t:'cpuDeb',v:0.15},css:'card-rare'},
  {id:'golden',name:'黄金时刻',icon:'👑',rarity:'epic',rl:'史诗',desc:'接下来<em class="cv">3</em>回合所有判定视为<em class="ck">PERFECT</em>（含miss）',dur:3,eff:{t:'allP',v:1},css:'card-epic'},
  {id:'sx2',name:'双倍狂欢',icon:'🎪',rarity:'epic',rl:'史诗',desc:'接下来<em class="cv">3</em>回合<em class="ck">分数翻倍</em>',dur:3,eff:{t:'sMult',v:2.0},css:'card-epic'},
  {id:'steal',name:'偷分大盗',icon:'🦊',rarity:'epic',rl:'史诗',desc:'偷取对手<em class="cn">500</em>分',dur:0,eff:{t:'steal',v:500},css:'card-epic'},
  {id:'infC',name:'不灭连击',icon:'♾️',rarity:'legendary',rl:'传说',desc:'接下来<em class="cv">5</em>回合<em class="ck">combo永不断裂</em>且自动<em class="ck">PERFECT</em>',dur:5,eff:{t:'infCombo',v:1},css:'card-legendary'},
  {id:'swap',name:'命运逆转',icon:'🔮',rarity:'legendary',rl:'传说',desc:'与对手<em class="cn">交换当前分数</em>',dur:0,eff:{t:'swapS',v:1},css:'card-legendary'},
  // === 对敌互动卡牌 ===
  {id:'addN',name:'音符轰炸',icon:'💣',rarity:'rare',rl:'稀有',desc:'接下来<em class="cv">3</em>回合对手每轮多<em class="cn">2</em>个音符',dur:3,eff:{t:'addNotes',v:2},target:'opp',css:'card-rare'},
  {id:'oppSpd',name:'疾风骤雨',icon:'🌪️',rarity:'rare',rl:'稀有',desc:'接下来<em class="cv">2</em>回合对手<em class="ck">音轨</em>加速<em class="cn">40%</em>',dur:2,eff:{t:'oppSpeed',v:0.40},target:'opp',css:'card-rare'},
  {id:'sDeb',name:'暗箱操作',icon:'🕳️',rarity:'epic',rl:'史诗',desc:'接下来<em class="cv">3</em>回合对手<em class="ck">得分</em><em class="cn">-30%</em>',dur:3,eff:{t:'oppSDebuff',v:0.30},target:'opp',css:'card-epic'},
  {id:'ink',name:'墨汁陷阱',icon:'🦑',rarity:'epic',rl:'史诗',desc:'接下来<em class="cv">2</em>回合对手<em class="cv">1</em>个按键被<em class="cn">墨汁遮挡</em>',dur:2,eff:{t:'inkBlot',v:1},target:'opp',css:'card-epic'},
];
// === 永久构筑卡牌 —— 一旦选中，整局有效 ===
const PERM_CARDS=[
  {id:'pp100',name:'完美之心',icon:'💎',rarity:'rare',rl:'稀有',desc:'【永久】<em class="ck">PERFECT</em>额外+<em class="cv">100</em>分',dur:-1,perm:true,eff:{t:'pBonus',v:100},css:'card-perm'},
  {id:'pp250',name:'极致完美',icon:'🏆',rarity:'epic',rl:'史诗',desc:'【永久】<em class="ck">PERFECT</em>额外+<em class="cv">250</em>分',dur:-1,perm:true,eff:{t:'pBonus',v:250},css:'card-perm'},
  {id:'pjw10',name:'柔软触感',icon:'🧤',rarity:'common',rl:'普通',desc:'【永久】<em class="ck">判定窗口</em>扩大<em class="cv">10%</em>',dur:-1,perm:true,eff:{t:'jWiden',v:0.10},css:'card-perm'},
  {id:'pjw20',name:'第六感',icon:'🔮',rarity:'rare',rl:'稀有',desc:'【永久】<em class="ck">判定窗口</em>扩大<em class="cv">20%</em>',dur:-1,perm:true,eff:{t:'jWiden',v:0.20},css:'card-perm'},
  {id:'psm8',name:'聚宝盆',icon:'🪙',rarity:'common',rl:'普通',desc:'【永久】所有<em class="ck">判定得分</em>+<em class="cv">8%</em>',dur:-1,perm:true,eff:{t:'sMult',v:1.08},css:'card-perm'},
  {id:'psm15',name:'黄金体质',icon:'✨',rarity:'rare',rl:'稀有',desc:'【永久】所有<em class="ck">判定得分</em>+<em class="cv">15%</em>',dur:-1,perm:true,eff:{t:'sMult',v:1.15},css:'card-perm'},
  {id:'pcb',name:'连击体质',icon:'🧬',rarity:'rare',rl:'稀有',desc:'【永久】<em class="ck">combo基础加成</em>+<em class="cv">50%</em>',dur:-1,perm:true,eff:{t:'cBoost',v:1.5},css:'card-perm'},
  {id:'pauto1',name:'肌肉记忆',icon:'💪',rarity:'common',rl:'普通',desc:'【永久】自动输入第<em class="cv">1</em>个音符',dur:-1,perm:true,eff:{t:'autoIn',v:1},css:'card-perm'},
  {id:'pts5',name:'时间感知',icon:'⏰',rarity:'common',rl:'普通',desc:'【永久】<em class="ck">音轨速度</em>减慢<em class="cv">5%</em>',dur:-1,perm:true,eff:{t:'tSlow',v:0.05},css:'card-perm'},
  {id:'pcs',name:'不屈意志',icon:'🛡️',rarity:'rare',rl:'稀有',desc:'【永久】每轮首次断连<em class="ck">不清零combo</em>',dur:-1,perm:true,eff:{t:'cShield',v:1},css:'card-perm'},
];
const RW={common:50,rare:30,epic:15,legendary:5};
let pPermCards=[],cPermCards=[]; // 永久卡牌存储
// 抽卡：每次3张中至少有1张可能是永久卡（30%概率出1张永久卡）
function randCards(n){
  const pool=[...ALL_CARDS],res=[];
  // 35%概率混入一张永久卡（过滤已拥有的）
  const ownedPermIds=pPermCards.map(c=>c.id);
  const availPerm=PERM_CARDS.filter(c=>!ownedPermIds.includes(c.id));
  let permSlot=-1;
  if(availPerm.length>0&&Math.random()<0.35)permSlot=Math.floor(Math.random()*n);
  for(let i=0;i<n&&pool.length;i++){
    if(i===permSlot){
      // 从可用永久卡中按稀有度加权抽取
      const tw=availPerm.reduce((s,c)=>s+RW[c.rarity],0);let r=Math.random()*tw,pi=0;
      for(let j=0;j<availPerm.length;j++){r-=RW[availPerm[j].rarity];if(r<=0){pi=j;break}}
      res.push(availPerm[pi]);continue;
    }
    const tw=pool.reduce((s,c)=>s+RW[c.rarity],0);let r=Math.random()*tw,pi=0;
    for(let j=0;j<pool.length;j++){r-=RW[pool[j].rarity];if(r<=0){pi=j;break}}
    res.push(pool[pi]);pool.splice(pi,1);
  }
  return res;
}
// AI抽卡（纯临时卡）
function randCardsAI(n){const pool=[...ALL_CARDS],res=[];for(let i=0;i<n&&pool.length;i++){const tw=pool.reduce((s,c)=>s+RW[c.rarity],0);let r=Math.random()*tw,pi=0;for(let j=0;j<pool.length;j++){r-=RW[pool[j].rarity];if(r<=0){pi=j;break}}res.push(pool[pi]);pool.splice(pi,1)}return res}
function getEff(cards,t){
  for(const c of cards)if(c.eff.t===t&&c.rem>0)return c.eff.v;
  return null;
}
// 获取效果值（包含永久卡牌）
function getEffAll(cards,permCards,t){
  let v=getEff(cards,t);
  for(const c of permCards)if(c.eff.t===t){
    if(v===null)v=c.eff.v;
    else{
      // 叠加规则
      if(t==='sMult')v*=c.eff.v; // sMult相乘（如1.1*1.08=1.188）
      else if(t==='pBonus'||t==='jWiden'||t==='tSlow')v+=c.eff.v; // 累加
      else v=Math.max(v,c.eff.v); // autoIn/cBoost/cShield等取最大
    }
  }
  return v;
}
function hasEff(cards,t){return cards.some(c=>c.eff.t===t&&c.rem>0)}
function hasEffAll(cards,permCards,t){return hasEff(cards,t)||permCards.some(c=>c.eff.t===t)}
function applyCard(card,pl,opp){
  const e=card.eff;
  // 永久卡牌处理
  if(card.perm){
    if(pl===player1)pPermCards.push({...card});
    else cPermCards.push({...card});
    return;
  }
  if(e.t==='instS')pl.score+=e.v;
  else if(e.t==='steal'){const s=Math.min(opp.score,e.v);opp.score-=s;pl.score+=s;triggerAttackVFX(card,pl,opp)}
  else if(e.t==='swapS'){const t=pl.score;pl.score=opp.score;opp.score=t;triggerAttackVFX(card,pl,opp)}
  else if(card.dur>0){const ac={...card,rem:card.dur};if(card.target==='opp'){if(opp===player1)pCards.push(ac);else cCards.push(ac);triggerAttackVFX(card,pl,opp)}else{if(pl===player1)pCards.push(ac);else cCards.push(ac);if(e.t==='cpuDeb')triggerAttackVFX(card,pl,opp)}}
}

// ========== PlayerState ==========
class PlayerState{
  constructor(side,isAI=false){
    this.side=side;this.isAI=isAI;this.score=0;this.combo=0;this.maxCombo=0;
    this.inputIndex=0;this.inputComplete=false;this.spaceProtected=true;
    this.roundJudged=false;this.currentJudgment=null;this.trackProgress=0;
    this.trackAfterImages=[];this.judgmentDisplay=null;this.comboDisplay=null;
    this.particles=[];this.fireParticles=[];this.spotlightEffect=null;
    this.dancer=null;this.noteStates=[];this.roundNotes=[];this.inkMask=[];this.baseNoteCount=0;
    this.aiInputTimer=0;this.aiInputIdx=0;this.aiSpaceScheduled=false;this.aiSpaceTime=0;this.aiWillMiss=false;
    this.comboShieldUsed=false;this.comboMilestone=null;
    if(side==='left'){this.themeColor='#4488ff';this.themeName='PLAYER';this.hairCol='#442200';this.outfitCol='#4466ff';this.shoeCol='#ff3366';this.accCol='#ff66aa'}
    else{this.themeColor='#ff4488';this.themeName='电脑玩家';this.hairCol='#331155';this.outfitCol='#cc44ff';this.shoeCol='#44ccff';this.accCol='#44ffcc'}
  }
  reset(){this.score=0;this.combo=0;this.maxCombo=0;this.particles=[];this.fireParticles=[];this.spotlightEffect=null;this.judgmentDisplay=null;this.comboDisplay=null;this.dancer=new Dancer(this);this.comboShieldUsed=false;this.comboMilestone=null}
  resetRound(round,extraNotes){
    this.inputIndex=0;this.inputComplete=false;this.spaceProtected=true;this.roundJudged=false;this.currentJudgment=null;this.trackProgress=0;this.trackAfterImages=[];
    // 复制音符，如果有addNotes效果则额外添加随机音符（总数不超过MAX_NOTES）
    this.roundNotes=[...round.notes];this.baseNoteCount=round.notes.length;
    if(extraNotes>0){const canAdd=Math.max(0,MAX_NOTES-this.roundNotes.length);for(let i=0;i<Math.min(extraNotes,canAdd);i++)this.roundNotes.push(DIR_KEYS[Math.floor(Math.random()*4)]);}
    this.noteStates=new Array(this.roundNotes.length).fill('pending');
    // 墨汁效果：随机标记部分音符为被遮挡
    const cards=this.isAI?cCards:pCards;
    this.inkMask=new Array(this.roundNotes.length).fill(false);
    if(hasEff(cards,'inkBlot')){const idx=Math.floor(Math.random()*this.roundNotes.length);this.inkMask[idx]=true}
    this.aiInputTimer=0;this.aiInputIdx=0;this.aiSpaceScheduled=false;this.aiWillMiss=false;this.comboShieldUsed=false;
    if(this.isAI){const cfg=DIFF_CONFIG[selectedDifficulty];this.aiWillMiss=Math.random()<cfg.judgeDist.miss}
    if(!this.isAI){const ac=getEffAll(pCards,pPermCards,'autoIn');if(ac){const n=Math.min(ac,this.roundNotes.length);for(let i=0;i<n;i++){this.noteStates[i]='success';this.inputIndex=i+1}if(this.inputIndex>=this.roundNotes.length)this.inputComplete=true}}
    if(this.dancer)this.dancer.playAnimation('inputting')}
  getAreaX(){return this.side==='left'?0:HALF_W()}
  getAreaW(){return HALF_W()}
  getCenterX(){return this.getAreaX()+this.getAreaW()/2}
  getBoardW(){return Math.min(280,this.getAreaW()*0.85)}
  getBoardH(){return 80}
  getBoardX(){return this.getCenterX()-this.getBoardW()/2}
  getBoardY(){return H()*0.58}
  getTrackX(){return this.getBoardX()}
  getTrackY(){return this.getBoardY()+this.getBoardH()+20}
  getTrackW(){return this.getBoardW()}
  getTrackH(){return 28}
}

// ========== Dancer ==========
class Dancer{
  constructor(p){
    this.player=p;this.baseX=0;this.baseY=0;
    this.joints={headTilt:0,bodyTilt:0,bodyBend:0,leftArmUpper:-0.3,leftArmLower:0,rightArmUpper:0.3,rightArmLower:0,leftLegUpper:0.1,leftLegLower:0,rightLegUpper:-0.1,rightLegLower:0,hipRotation:0};
    this.targetJoints={...this.joints};
    this.currentAnim='idle';this.animTime=0;this.animDuration=2000;this.glowColor='rgba(100,150,255,0.3)';this.glowIntensity=0;
    this.trailParticles=[];this.jumpY=0;this.spinAngle=0;this.squash=1;this.stretch=1;this.floorSparks=[];
    this.skinColor='#ffddcc';this.hairColor=p.hairCol;this.outfitColor=p.outfitCol;this.shoeColor=p.shoeCol;this.accColor=p.accCol;
    this.aura=0;this.auraColor='#4488ff';this.bodyScale=1.8;
  }
  setPosition(x,y){this.baseX=x;this.baseY=y}
  playAnimation(type){
    this.currentAnim=type;this.animTime=0;
    const m={perfect:[1800,'rgba(255,220,0,0.6)',1],great:[1400,'rgba(68,221,255,0.5)',0.8],good:[1200,'rgba(68,255,136,0.4)',0.5],bad:[1000,'rgba(255,100,68,0.3)',0.3],miss:[1200,'rgba(100,100,100,0.2)',0]};
    const v=m[type];if(v){this.animDuration=v[0];this.glowColor=v[1];this.glowIntensity=v[2]}else{this.animDuration=2000}
  }
  update(dt,ts){
    this.animTime+=dt*1000;const t=this.animTime/this.animDuration,p=Math.min(t,1),pc=this.player.combo;
    switch(this.currentAnim){
      case 'idle':this._idle(ts);break;case 'perfect':this._perfect(p,ts);break;case 'great':this._great(p,ts);break;
      case 'good':this._good(p,ts);break;case 'bad':this._bad(p,ts);break;case 'miss':this._miss(p,ts);break;case 'inputting':this._inputting(ts);break;
    }
    if(p>=1&&this.currentAnim!=='idle'&&this.currentAnim!=='inputting'){this.currentAnim='idle';this.animTime=0}
    for(const k in this.joints)this.joints[k]+=(this.targetJoints[k]-this.joints[k])*Math.min(1,dt*12);
    this.glowIntensity=Math.max(0,this.glowIntensity-dt*0.3);
    for(let i=this.trailParticles.length-1;i>=0;i--){const tp=this.trailParticles[i];tp.life-=dt*tp.decay;tp.x+=tp.vx*dt;tp.y+=tp.vy*dt;tp.vy+=30*dt;if(tp.life<=0)this.trailParticles.splice(i,1)}
    for(let i=this.floorSparks.length-1;i>=0;i--){const s=this.floorSparks[i];s.life-=dt*s.decay;s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=80*dt;if(s.life<=0)this.floorSparks.splice(i,1)}
    if(pc>=3){this.aura=Math.min(1,this.aura+dt*2);this.auraColor=pc>=15?'#ff44ff':pc>=10?'#ff8800':pc>=8?'#ff4400':pc>=5?'#ffaa00':'#4488ff'}else{this.aura=Math.max(0,this.aura-dt*3)}
  }
  _idle(ts){const t=ts*0.001;this.targetJoints.bodyTilt=Math.sin(t*1.5)*0.05;this.targetJoints.bodyBend=0;this.targetJoints.headTilt=Math.sin(t*2)*0.08;this.targetJoints.hipRotation=Math.sin(t*1.2)*0.03;this.targetJoints.leftArmUpper=-0.3+Math.sin(t*1.5)*0.15;this.targetJoints.leftArmLower=Math.sin(t*1.2)*0.1;this.targetJoints.rightArmUpper=0.3+Math.sin(t*1.5+1)*0.15;this.targetJoints.rightArmLower=Math.sin(t*1.2+1)*0.1;this.targetJoints.leftLegUpper=0.05+Math.sin(t*1.5)*0.03;this.targetJoints.leftLegLower=0;this.targetJoints.rightLegUpper=-0.05+Math.sin(t*1.5+Math.PI)*0.03;this.targetJoints.rightLegLower=0;this.jumpY*=0.9;this.spinAngle*=0.9;this.squash+=(1-this.squash)*0.1;this.stretch+=(1-this.stretch)*0.1}
  _inputting(ts){const t=ts*0.001,beat=(ts-gameStartTime)/BEAT_MS,bf=beat%1,b=Math.sin(bf*Math.PI)*0.1;this.targetJoints.bodyTilt=Math.sin(t*3)*0.08;this.targetJoints.bodyBend=-b*0.3;this.targetJoints.headTilt=Math.sin(t*4)*0.1;this.targetJoints.hipRotation=Math.sin(t*3)*0.08;this.targetJoints.leftArmUpper=-0.8+Math.sin(t*3)*0.3;this.targetJoints.leftArmLower=-0.5+Math.sin(t*4)*0.2;this.targetJoints.rightArmUpper=0.8+Math.sin(t*3+Math.PI)*0.3;this.targetJoints.rightArmLower=0.5+Math.sin(t*4+Math.PI)*0.2;this.targetJoints.leftLegUpper=0.05+b*0.5;this.targetJoints.leftLegLower=-b*0.3;this.targetJoints.rightLegUpper=-0.05-b*0.5;this.targetJoints.rightLegLower=b*0.3;this.jumpY=-b*8;this.spinAngle*=0.95}
  _perfect(p,ts){
    if(p<0.15){const s=p/0.15;this.targetJoints.bodyBend=-0.3*s;this.targetJoints.leftLegUpper=0.4*s;this.targetJoints.rightLegUpper=-0.4*s;this.targetJoints.leftLegLower=-0.3*s;this.targetJoints.rightLegLower=0.3*s;this.targetJoints.leftArmUpper=-1.2*s;this.targetJoints.rightArmUpper=1.2*s;this.squash=1+0.15*s;this.stretch=1-0.1*s}
    else if(p<0.55){const s=(p-0.15)/0.4,jc=Math.sin(s*Math.PI);this.jumpY=-jc*55;this.spinAngle=s*Math.PI*4;this.squash=1-0.1*jc;this.stretch=1+0.15*jc;this.targetJoints.bodyBend=0;this.targetJoints.bodyTilt=Math.sin(s*Math.PI*2)*0.2;this.targetJoints.leftArmUpper=-2.5+Math.sin(s*Math.PI*2)*0.5;this.targetJoints.rightArmUpper=2.5+Math.sin(s*Math.PI*2+Math.PI)*0.5;this.targetJoints.leftLegUpper=-0.5+Math.sin(s*Math.PI)*0.8;this.targetJoints.rightLegUpper=0.3;this.targetJoints.headTilt=Math.sin(s*Math.PI*3)*0.15;if(Math.random()<0.4)this._trail('#ffdd00','#ff8800')}
    else if(p<0.75){const s=(p-0.55)/0.2;this.jumpY*=0.7;this.spinAngle*=0.8;this.squash=1+0.2*(1-s);this.stretch=1-0.1*(1-s);this.targetJoints.bodyBend=-0.15*(1-s);this.targetJoints.leftArmUpper=-2.2+s*1.9;this.targetJoints.rightArmUpper=2.2-s*1.5;this.targetJoints.leftLegUpper=0.3*(1-s);this.targetJoints.rightLegUpper=-0.3*(1-s);if(s<0.1)for(let i=0;i<5;i++)this.floorSparks.push({x:this.baseX+(Math.random()-0.5)*25,y:this.baseY,vx:(Math.random()-0.5)*100,vy:-25-Math.random()*50,life:1,decay:2+Math.random(),size:2+Math.random()*2.5,color:'#ffcc00'})}
    else{const s=(p-0.75)/0.25;this.jumpY*=0.9;this.spinAngle*=0.85;this.targetJoints.bodyTilt=0;this.targetJoints.bodyBend=0;this.targetJoints.leftArmUpper=-2.5+(1-Math.abs(Math.sin(s*Math.PI)))*0.3;this.targetJoints.rightArmUpper=2.5-(1-Math.abs(Math.sin(s*Math.PI)))*0.3;this.targetJoints.leftLegUpper=0.15;this.targetJoints.rightLegUpper=-0.15;this.targetJoints.headTilt=-0.1;this.squash+=(1-this.squash)*0.1;this.stretch+=(1-this.stretch)*0.1}
  }
  _great(p,ts){
    if(p<0.2){const s=p/0.2;this.targetJoints.bodyTilt=0.2*s;this.targetJoints.hipRotation=0.15*s;this.targetJoints.leftArmUpper=-0.3-1.5*s;this.targetJoints.rightArmUpper=0.3+0.8*s;this.targetJoints.leftLegUpper=0.1+0.3*s;this.targetJoints.rightLegUpper=-0.1-0.2*s;this.jumpY=-s*18}
    else if(p<0.5){const s=(p-0.2)/0.3;this.targetJoints.bodyTilt=0.2-0.4*s;this.targetJoints.hipRotation=0.15-0.3*s;this.targetJoints.leftArmUpper=-1.8+1.0*s;this.targetJoints.rightArmUpper=1.1-0.3*s;this.targetJoints.leftLegUpper=0.4-0.6*s;this.targetJoints.rightLegUpper=-0.3+0.5*s;this.jumpY=-18+s*18;if(Math.random()<0.25)this._trail('#44ddff','#2288aa')}
    else if(p<0.8){const s=(p-0.5)/0.3;this.targetJoints.bodyTilt=-0.2+0.2*s;this.targetJoints.hipRotation=-0.15+0.15*s;this.targetJoints.leftArmUpper=-0.8+0.3*s;this.targetJoints.rightArmUpper=0.8+0.8*s;this.targetJoints.headTilt=Math.sin(s*Math.PI)*0.2}
    else{const s=(p-0.8)/0.2;this.targetJoints.bodyTilt*=(1-s);this.targetJoints.hipRotation*=(1-s);this.targetJoints.leftArmUpper=-0.5+0.2*s;this.targetJoints.rightArmUpper=1.6-1.3*s;this.targetJoints.headTilt*=(1-s)}
  }

// ========== Two players ==========
let player1=null,player2=null;

// ========== Audio ==========
const AudioCtx=window.AudioContext||window.webkitAudioContext;let audioCtx=null;
function playTick(f=800,d=0.05,v=0.15){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d)}
function playBeat(k){playTick(k?600:400,k?0.12:0.06,k?0.25:0.1)}
function playSuccess(){playTick(1200,0.08,0.2)}
function playError(){playTick(200,0.15,0.2)}
function playJudgment(type){const m={perfect:[800,1000,1200],great:[700,900],good:[600,750],bad:[300,250],miss:[200]};(m[type]||[400]).forEach((f,i)=>setTimeout(()=>playTick(f,0.1,0.15),i*60))}
let bgInterval=null,bgBeatIdx=0;
function startBG(){bgBeatIdx=0;if(bgInterval)clearInterval(bgInterval);bgInterval=setInterval(()=>{bgBeatIdx++;playBeat(bgBeatIdx%4===1)},BEAT_MS)}
function stopBG(){if(bgInterval){clearInterval(bgInterval);bgInterval=null}}

// ========== Rounds ==========
const MAX_NOTES=5; // 单回合最大音符数
function generateRounds(){rounds=[];for(let i=0;i<totalRounds;i++){const lv=Math.min(Math.floor(i/3)+1,9),nc=Math.min(lv+1,MAX_NOTES),st=(i>0&&i%7===6),notes=[];for(let j=0;j<nc;j++)notes.push(DIR_KEYS[Math.floor(Math.random()*4)]);rounds.push({level:lv,notes,isShowtime:st})}}

// ========== AI ==========
function updateAI(dt,ts,p2){
  if(gameState!=='roundInput'||p2.roundJudged||currentRound<0||currentRound>=totalRounds)return;
  const round=rounds[currentRound],cfg=DIFF_CONFIG[selectedDifficulty];
  const acc0=Math.min(cfg.inputMaxAcc, cfg.inputBaseAcc + currentRound * cfg.inputGrowth);
  const debV=getEff(pCards,'cpuDeb');const acc=debV?Math.max(0.2,acc0-debV):acc0;
  const interval=Math.max(cfg.inputMinInterval, cfg.inputBaseInterval - currentRound * cfg.inputSpeedGrowth);
  
  // 如果本轮AI注定miss，故意拖延输入（增大interval倍率），让它来不及
  const effInterval = p2.aiWillMiss ? interval * 2.5 : interval;
  
  if(!p2.inputComplete&&p2.aiInputIdx<p2.roundNotes.length){
    p2.aiInputTimer+=dt*1000;
    if(p2.aiInputTimer>=effInterval){p2.aiInputTimer=0;
      // miss模式下降低输入正确率
      const effAcc = p2.aiWillMiss ? acc * 0.4 : acc;
      if(Math.random()<effAcc){p2.noteStates[p2.aiInputIdx]='success';p2.aiInputIdx++;
        if(p2.aiInputIdx>=p2.roundNotes.length){p2.inputComplete=true;
          if(p2.aiWillMiss){
            // miss: 不按空格，等轨道走完自然miss
          } else {
            // 非miss: 根据判定分布（去掉miss部分重新归一化）决定判定
            const jType=pickAINonMissJudgment(cfg.judgeDist);
            const tt=roundStartTime+TRACK_DURATION*JUDGE_LINE_RATIO;
            let offset=0;
            if(jType==='perfect') offset=(Math.random()-0.5)*2*JUDGE_PERFECT*0.9;
            else if(jType==='great') offset=(Math.random()>0.5?1:-1)*(JUDGE_PERFECT+1+Math.random()*(JUDGE_GREAT-JUDGE_PERFECT-2));
            else if(jType==='good') offset=(Math.random()>0.5?1:-1)*(JUDGE_GREAT+1+Math.random()*(JUDGE_GOOD-JUDGE_GREAT-2));
            else offset=(Math.random()>0.5?1:-1)*(JUDGE_GOOD+1+Math.random()*(JUDGE_BAD-JUDGE_GOOD-2));
            p2.aiSpaceTime=tt+offset;p2.aiSpaceScheduled=true;
          }
        }}
      else{for(let i=0;i<p2.roundNotes.length;i++)p2.noteStates[i]='pending';p2.aiInputIdx=0}
    }
  }
  if(p2.aiSpaceScheduled&&!p2.roundJudged&&ts>=p2.aiSpaceTime){
    p2.aiSpaceScheduled=false;const tt=roundStartTime+TRACK_DURATION*JUDGE_LINE_RATIO,d=Math.abs(ts-tt);
    p2.trackAfterImages.push({progress:p2.trackProgress,alpha:1,time:ts});
    let type;if(d<=JUDGE_PERFECT)type='perfect';else if(d<=JUDGE_GREAT)type='great';else if(d<=JUDGE_GOOD)type='good';else if(d<=JUDGE_BAD)type='bad';else type='miss';
    doPlayerJudgment(p2,type);
  }
}
function pickAINonMissJudgment(dist){
  // 在非miss情况下，根据good/great/perfect比例选择
  const total=dist.good+dist.great+dist.perfect;
  const r=Math.random()*total;
  if(r<dist.good) return 'good';
  if(r<dist.good+dist.great) return 'great';
  return 'perfect';
}

// ========== Game flow ==========
let introStartTime=0;
function startGame(){audioCtx=new AudioCtx();document.getElementById('startScreen').style.display='none';gameState='playing';currentRound=-1;player1=new PlayerState('left',false);player2=new PlayerState('right',true);player1.reset();player2.reset();pCards=[];cCards=[];pPermCards=[];cPermCards=[];generateRounds();gameStartTime=performance.now();introStartTime=gameStartTime;lastBeatTime=gameStartTime;beatCount=0;startBG();updCardTags();setTimeout(()=>nextRound(),MEASURE_MS*1.5)}
let bothTimer=null;
function nextRound(){if(currentRound>=0){tickCards();updCardTags()}currentRound++;if(currentRound>=totalRounds){endGame();return}if(currentRound>0&&currentRound%CARD_INTERVAL===0){gameState='cardSelect';showCardUI();return}startRoundPlay()}
function startRoundPlay(){if(bothTimer){clearTimeout(bothTimer);bothTimer=null}const r=rounds[currentRound];
  // 计算每个玩家的额外音符数（来自对手对其施加的addNotes效果）
  const p1Extra=getEff(pCards,'addNotes')||0;
  const p2Extra=getEff(cCards,'addNotes')||0;
  player1.resetRound(r,p1Extra);player2.resetRound(r,p2Extra);
  roundStartTime=performance.now();gameState='roundInput';setTimeout(()=>{if(player1)player1.spaceProtected=false;if(player2)player2.spaceProtected=false},MEASURE_MS/2)}
function doPlayerJudgment(p,type){if(p.roundJudged)return;const cards=p.isAI?cCards:pCards;const perm=p.isAI?cPermCards:pPermCards;
  // 黄金时刻：所有判定（包括miss）都变为perfect
  if(hasEff(cards,'allP'))type='perfect';
  // 不灭连击：combo不断 + 所有判定自动变为perfect
  if(hasEff(cards,'infCombo'))type='perfect';
  p.roundJudged=true;p.currentJudgment=type;if(!p.isAI)playJudgment(type);const sm={perfect:1000,great:700,good:400,bad:100,miss:0};let rs=sm[type]||0;
  // sMult: 临时卡+永久卡叠加
  const sMul=getEffAll(cards,perm,'sMult');if(sMul)rs=Math.floor(rs*sMul);
  // 对手减分debuff
  const sDebV=getEff(cards,'oppSDebuff');if(sDebV)rs=Math.floor(rs*(1-sDebV));
  // combo续接：great以上(perfect/great)都续combo
  if(type==='perfect'||type==='great'){
    const pb=getEffAll(cards,perm,'pBonus');if(pb&&type==='perfect')rs+=pb;
    p.combo++;if(p.combo>p.maxCombo)p.maxCombo=p.combo;
    // combo加成系统：基础combo*100 + 档位加成系数
    const cB=getEffAll(cards,perm,'cBoost');
    const baseComboBonus=cB?p.combo*100*cB:p.combo*100;
    // 档位加成：5连=1.2x, 10连=1.5x, 15连=2.0x
    let comboMult=1;
    if(p.combo>=15)comboMult=2.0;
    else if(p.combo>=10)comboMult=1.5;
    else if(p.combo>=5)comboMult=1.2;
    rs+=Math.floor(baseComboBonus*comboMult);
    // 判定文字和combo分开显示
    showJText(p,type);
    if(p.combo>=2)showCombo(p,p.combo);
    // combo里程碑特效
    if(p.combo===5||p.combo===10||p.combo===15)triggerComboMilestone(p,p.combo);
  }else{
    if(hasEffAll(cards,perm,'cShield')&&!p.comboShieldUsed&&p.combo>0){p.comboShieldUsed=true;showJText(p,type)}
    else if(hasEff(cards,'infCombo')&&p.combo>0){showJText(p,type)}
    else{p.combo=0;showJText(p,type)}
  }
  p.score+=rs;createNoteExplosion(p,type);if(p.combo>=2)createSpotlight(p,p.combo);if(p.dancer)p.dancer.playAnimation(type);checkBoth()}
function checkBoth(){if(player1.roundJudged&&player2.roundJudged){if(bothTimer)clearTimeout(bothTimer);bothTimer=setTimeout(()=>nextRound(),MEASURE_MS*0.8)}}
function endGame(){gameState='finished';stopBG();updCardTags()}

// ========== Input ==========
document.addEventListener('keydown',e=>{
  if(cardState==='selecting'){if(e.key==='1'||e.key==='2'||e.key==='3'){const i=parseInt(e.key)-1;if(i<cardChoices.length)pickCard(i)}return}
  if(gameState==='finished'){if(e.code==='Space'){document.getElementById('startScreen').style.display='flex';gameState='idle'}return}
  if(gameState!=='roundInput')return;const p=player1;if(p.roundJudged)return;

    const now=performance.now(),tt=roundStartTime+TRACK_DURATION*JUDGE_LINE_RATIO,d=Math.abs(now-tt);

// 开局入场引导覆盖层 — 前3秒展示，之后淡出
function drawIntroOverlay(ts){
  const elapsed=ts-introStartTime;

  if(elapsed>SHOW_DUR+FADE_DUR)return;

  // 左半屏蓝色高光边框

  ctx.font='bold 26px Arial';ctx.fillStyle='#ff4488';
  ctx.shadowColor='#ff4488';ctx.shadowBlur=20;
  ctx.fillText('🤖 电脑玩家',hw+hw/2+offsetR,h*0.35);
  ctx.shadowBlur=0;
  ctx.font='14px Arial';ctx.fillStyle='rgba(255,180,200,0.9)';
  ctx.fillText('电脑自动操作',hw+hw/2+offsetR,h*0.35+35);

  if(elapsed>400){

    ctx.shadowBlur=0;
  }

}

function drawStageFloor(ts,p){const cx=p.getCenterX(),fy=p.getBoardY()-12;ctx.save();const fg=ctx.createRadialGradient(cx,fy,6,cx,fy,120);fg.addColorStop(0,`rgba(80,100,180,${0.08+beatFlash*0.05})`);fg.addColorStop(0.6,`rgba(40,50,100,${0.03+beatFlash*0.02})`);fg.addColorStop(1,'transparent');ctx.fillStyle=fg;ctx.fillRect(cx-140,fy-3,280,20);ctx.restore();

  ctx.save();const zw=tw*(JUDGE_BAD/TRACK_DURATION);

function drawComboDisplay(ts,p){
  if(!p.comboDisplay)return;
  const el=ts-p.comboDisplay.time,pr=el/p.comboDisplay.duration;
  if(pr>=1){p.comboDisplay=null;return}
  const cnt=p.comboDisplay.count,ph=gcp(cnt);
  const cx=p.getCenterX(),cy=110;
  // 弹跳缩放动画（高combo更夸张）
  const bounceScale=ph>=4?1.5:ph>=3?1.4:1.3;
  const sc=pr<0.1?eob(pr/0.1)*bounceScale:pr<0.2?bounceScale-(pr-0.1)/0.1*(bounceScale-1):1;
  const al=pr>0.65?1-(pr-0.65)/0.35:1;
  const floatY=pr*-15;
  ctx.save();
  ctx.translate(cx,cy+floatY);ctx.scale(sc,sc);ctx.globalAlpha=al;
  // 档位颜色体系
  const colors=['#ffdd00','#ffcc00','#ffaa00','#ff8800','#ff5500','#ff2244','#ff00ff','#00ffff'];
  const glows=['#ffee44','#ffcc22','#ff9900','#ff6600','#ff3300','#ff0044','#ff44ff','#44ffff'];
  const col=colors[Math.min(ph,7)],glow=glows[Math.min(ph,7)];

  // 高combo旋转脉冲
  if(ph>=5){const pulse=Math.sin(ts*0.02)*0.03;ctx.rotate(pulse)}

  if(cnt>=10){
    const ringR=fontSize*0.9+Math.sin(ts*0.008)*5;
    ctx.beginPath();ctx.arc(0,0,ringR,0,Math.PI*2);
    const rg=ctx.createRadialGradient(0,0,ringR*0.3,0,0,ringR);
    rg.addColorStop(0,cnt>=15?'rgba(255,0,255,0.15)':'rgba(255,150,0,0.12)');
    rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg;ctx.fill();
  }
  // combo文字
  ctx.font=`bold ${fontSize}px Arial`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor=glow;ctx.shadowBlur=12+ph*6;
  ctx.fillStyle=col;
  let label=`COMBO × ${cnt}`;
  if(cnt>=15)label=`🔥 COMBO × ${cnt} 🔥`;
  else if(cnt>=10)label=`⚡ COMBO × ${cnt} ⚡`;
  else if(cnt>=5)label=`✨ COMBO × ${cnt} ✨`;
  ctx.fillText(label,0,0);
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=2.5;ctx.strokeText(label,0,0);
  // 加成系数提示
  let multText='';
  if(cnt>=15)multText='得分 ×2.0';
  else if(cnt>=10)multText='得分 ×1.5';
  else if(cnt>=5)multText='得分 ×1.2';
  if(multText){
    ctx.font='bold 14px Arial';ctx.shadowBlur=6;
    ctx.fillStyle=cnt>=15?'#ff88ff':cnt>=10?'#ffaa44':'#ffee88';
    ctx.fillText(multText,0,fontSize*0.6+4);
  }
  ctx.restore();
}

  ctx.fill();ctx.stroke();

// ========== Attack VFX System ==========
// 全局攻击特效队列
let attackVFXList = [];

// 触发攻击特效 —— 在 applyCard 中调用
function triggerAttackVFX(card, attacker, victim) {
  const t = card.eff.t;
  const now = performance.now();
  const aCx = attacker.getCenterX(), aCy = attacker.getBoardY();
  const vCx = victim.getCenterX(), vCy = victim.getBoardY();
  
  // 通用配置
  const vfx = {
    type: t,
    card: card,
    startTime: now,
    attacker: attacker,
    victim: victim,
    // 飞行路径
    fromX: aCx, fromY: aCy - 40,
    toX: vCx, toY: vCy - 40,
    // 各阶段时长
    flyDuration: 600,
    impactDuration: 1200,
    phase: 'fly', // fly -> impact -> done
    particles: [],
    icon: card.icon,
    name: card.name,
  };

  // 每种攻击的专属配置
  switch(t) {
    case 'steal':
      vfx.color1 = '#ffcc00'; vfx.color2 = '#ff8800';
      vfx.impactColor = 'rgba(255,200,0,0.3)';
      vfx.flyDuration = 500; vfx.impactDuration = 1500;
      vfx.scoreSteal = card.eff.v;
      break;
    case 'swapS':
      vfx.color1 = '#cc44ff'; vfx.color2 = '#4444ff';
      vfx.impactColor = 'rgba(180,60,255,0.3)';
      vfx.flyDuration = 400; vfx.impactDuration = 1800;
      vfx.phase = 'impact'; // 交换直接全屏效果
      break;
    case 'addNotes':
      vfx.color1 = '#ff4444'; vfx.color2 = '#ff8800';
      vfx.impactColor = 'rgba(255,60,60,0.3)';
      break;
    case 'oppSpeed':
      vfx.color1 = '#44ccff'; vfx.color2 = '#88ffff';
      vfx.impactColor = 'rgba(60,200,255,0.25)';
      vfx.impactDuration = 1500;
      break;
    case 'oppSDebuff':
      vfx.color1 = '#333'; vfx.color2 = '#666';
      vfx.impactColor = 'rgba(0,0,0,0.35)';
      vfx.impactDuration = 1600;
      break;
    case 'inkBlot':
      vfx.color1 = '#111'; vfx.color2 = '#555';
      vfx.impactColor = 'rgba(20,0,40,0.35)';
      break;
    case 'cpuDeb':
      vfx.color1 = '#44ff44'; vfx.color2 = '#aaff44';
      vfx.impactColor = 'rgba(80,255,80,0.2)';
      break;
    default: return; // 非攻击卡不触发
  }
  
  attackVFXList.push(vfx);
  // 攻击音效
  playAttackSFX(t);
}

function playAttackSFX(type) {
  if (!audioCtx) return;
  switch(type) {
    case 'steal':
      playTick(300, 0.15, 0.25); setTimeout(()=>playTick(500, 0.1, 0.2), 80);
      setTimeout(()=>playTick(250, 0.2, 0.3), 200);
      break;
    case 'swapS':
      playTick(800, 0.2, 0.3); setTimeout(()=>playTick(400, 0.2, 0.25), 100);
      setTimeout(()=>playTick(1200, 0.15, 0.3), 250);
      setTimeout(()=>playTick(600, 0.2, 0.25), 400);
      break;
    case 'addNotes':
      playTick(200, 0.1, 0.2); setTimeout(()=>playTick(150, 0.1, 0.25), 100);
      setTimeout(()=>playTick(100, 0.15, 0.3), 200);
      break;
    case 'oppSpeed':
      for(let i=0;i<5;i++) setTimeout(()=>playTick(600+i*100, 0.06, 0.15), i*60);
      break;
    case 'oppSDebuff':
      playTick(180, 0.2, 0.2); setTimeout(()=>playTick(120, 0.25, 0.25), 150);
      break;
    case 'inkBlot':
      playTick(150, 0.15, 0.2); setTimeout(()=>playTick(100, 0.2, 0.3), 120);
      setTimeout(()=>playTick(80, 0.15, 0.2), 250);
      break;
    case 'cpuDeb':
      for(let i=0;i<4;i++) setTimeout(()=>playTick(1000+Math.random()*500, 0.04, 0.12), i*50);

}

// 更新和绘制所有攻击特效
function updateAndDrawAttackVFX(ts) {
  for (let i = attackVFXList.length - 1; i >= 0; i--) {
    const v = attackVFXList[i];
    const elapsed = ts - v.startTime;

    if (v.phase === 'fly') {
      const pr = Math.min(elapsed / v.flyDuration, 1);
      drawAttackFly(v, pr, ts);
      if (pr >= 1) {
        v.phase = 'impact';
        v.impactStart = ts;
        // 生成撞击粒子
        createImpactParticles(v);
        // 撞击时的受击音效
        playTick(200, 0.12, 0.3);
      }
    }

    if (v.phase === 'impact') {
      const impEl = ts - (v.impactStart || v.startTime);
      const pr = Math.min(impEl / v.impactDuration, 1);
      drawAttackImpact(v, pr, ts);
      if (pr >= 1) {
        attackVFXList.splice(i, 1);
      }
    }
  }
}

// 绘制飞行阶段 —— 卡牌图标从施法者飞向受害者
function drawAttackFly(v, pr, ts) {
  // 贝塞尔曲线路径（抛物线飞行）
  const cp = eob(pr); // 缓动
  const mx = (v.fromX + v.toX) / 2, my = Math.min(v.fromY, v.toY) - 120;
  const t = cp;
  const x = (1-t)*(1-t)*v.fromX + 2*(1-t)*t*mx + t*t*v.toX;
  const y = (1-t)*(1-t)*v.fromY + 2*(1-t)*t*my + t*t*v.toY;

  // 拖尾粒子
  if (Math.random() < 0.6) {
    v.particles.push({
      x: x + (Math.random()-0.5)*10, y: y + (Math.random()-0.5)*10,
      vx: (Math.random()-0.5)*30, vy: (Math.random()-0.5)*30,
      life: 1, decay: 2 + Math.random(), size: 3 + Math.random()*3,
      color: Math.random() > 0.5 ? v.color1 : v.color2
    });
  }

  // 绘制拖尾
  ctx.save();
  for (let j = v.particles.length - 1; j >= 0; j--) {
    const p = v.particles[j];
    p.life -= 0.03;
    p.x += p.vx * 0.016; p.y += p.vy * 0.016;
    if (p.life <= 0) { v.particles.splice(j, 1); continue; }
    ctx.globalAlpha = p.life * 0.7;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fill();
  }
  ctx.restore();

  // 绘制飞行的卡牌图标
  const iconSize = 28 + Math.sin(ts * 0.015) * 4;
  const rot = pr * Math.PI * 2;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.globalAlpha = 1;
  // 光环
  ctx.beginPath();
  ctx.arc(0, 0, iconSize * 0.8, 0, Math.PI * 2);
  ctx.fillStyle = v.color1;
  ctx.shadowColor = v.color1;
  ctx.shadowBlur = 20;
  ctx.globalAlpha = 0.4;
  ctx.fill();
  // 图标
  ctx.globalAlpha = 1;
  ctx.font = `${iconSize}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowBlur = 10;
  ctx.fillText(v.icon, 0, 0);
  ctx.restore();
}

// 生成撞击粒子
function createImpactParticles(v) {
  const cx = v.toX, cy = v.toY;
  for (let i = 0; i < 25; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 80 + Math.random() * 120;
    v.particles.push({
      x: cx, y: cy,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, decay: 1.5 + Math.random(), size: 3 + Math.random() * 4,
      color: Math.random() > 0.3 ? v.color1 : v.color2
    });
  }
}

// 绘制撞击/影响阶段
function drawAttackImpact(v, pr, ts) {
  const vp = v.victim;
  const vCx = vp.getCenterX(), vCy = H() / 2;
  const vAx = vp.getAreaX(), vAw = vp.getAreaW();

  // 更新粒子
  ctx.save();
  for (let j = v.particles.length - 1; j >= 0; j--) {
    const p = v.particles[j];
    p.life -= p.decay * 0.016;
    p.x += p.vx * 0.016; p.y += p.vy * 0.016;
    p.vy += 60 * 0.016;
    if (p.life <= 0) { v.particles.splice(j, 1); continue; }
    ctx.globalAlpha = Math.max(0, p.life * 0.8);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * Math.max(0, p.life), 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 4;
    ctx.fill();
  }
  ctx.restore();

  // 根据类型绘制不同的影响效果
  const impactAlpha = pr < 0.15 ? pr / 0.15 : pr < 0.4 ? 1 : 1 - (pr - 0.4) / 0.6;

  switch(v.type) {
    case 'steal': drawStealImpact(v, pr, impactAlpha, ts); break;
    case 'swapS': drawSwapImpact(v, pr, impactAlpha, ts); break;
    case 'addNotes': drawBombImpact(v, pr, impactAlpha, ts); break;
    case 'oppSpeed': drawSpeedImpact(v, pr, impactAlpha, ts); break;
    case 'oppSDebuff': drawDebuffImpact(v, pr, impactAlpha, ts); break;
    case 'inkBlot': drawInkImpact(v, pr, impactAlpha, ts); break;
    case 'cpuDeb': drawEMPImpact(v, pr, impactAlpha, ts); break;
  }

  // 通用：受害者区域闪红边框 + 警告
  if (impactAlpha > 0.05) {
    drawVictimWarning(v, impactAlpha, ts);
  }
}

// 偷分：金币从对手飞向自己
function drawStealImpact(v, pr, alpha, ts) {
  const numCoins = 8;
  for (let i = 0; i < numCoins; i++) {
    const coinPr = Math.max(0, Math.min(1, (pr - i * 0.05) / 0.6));
    if (coinPr <= 0 || coinPr >= 1) continue;
    const cp = eob(coinPr);
    const sx = v.toX + (Math.random()-0.5) * 30, sy = v.toY - 20 + i * 8;
    const ex = v.fromX, ey = v.fromY + 60;
    const cx = (sx+ex)/2, cy = Math.min(sy,ey) - 40 - i*10;
    const t = cp;
    const x = (1-t)*(1-t)*sx + 2*(1-t)*t*cx + t*t*ex;
    const y = (1-t)*(1-t)*sy + 2*(1-t)*t*cy + t*t*ey;
    const coinAlpha = coinPr < 0.1 ? coinPr/0.1 : coinPr > 0.8 ? (1-coinPr)/0.2 : 1;
    ctx.save();
    ctx.globalAlpha = coinAlpha * 0.9;
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 8;
    ctx.fillStyle = '#ffdd00';
    ctx.fillText('💰', x, y);
    ctx.restore();
  }
  // 分数变化文字
  if (pr > 0.1 && pr < 0.7) {
    const txtAlpha = pr < 0.2 ? (pr-0.1)/0.1 : pr > 0.5 ? (0.7-pr)/0.2 : 1;
    ctx.save();
    ctx.globalAlpha = txtAlpha;
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ff4444';
    ctx.fillText(`-${v.scoreSteal}`, v.toX, v.toY - 60 - pr*30);
    ctx.shadowColor = '#44ff44'; ctx.fillStyle = '#44ff44';
    ctx.fillText(`+${v.scoreSteal}`, v.fromX, v.fromY + 20 - pr*30);
    ctx.restore();
  }
}

// 命运逆转：全屏旋涡 + 分数互换闪光
function drawSwapImpact(v, pr, alpha, ts) {
  const cx = W()/2, cy = H()/2;
  // 旋涡
  ctx.save();
  ctx.globalAlpha = alpha * 0.5;
  const rotSpeed = pr * Math.PI * 6;
  const radius = 60 + pr * 200;
  for (let i = 0; i < 12; i++) {
    const a = (Math.PI * 2 / 12) * i + rotSpeed;
    const r = radius * (0.3 + Math.sin(a*2+ts*0.01) * 0.2);
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r * 0.6;
    ctx.beginPath();
    ctx.arc(x, y, 4 + Math.sin(ts*0.01+i)*2, 0, Math.PI * 2);
    ctx.fillStyle = i % 2 === 0 ? v.color1 : v.color2;
    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 10;
    ctx.fill();
  }
  ctx.restore();
  // 中心文字
  if (pr > 0.15 && pr < 0.7) {
    const txtAlpha = pr < 0.25 ? (pr-0.15)/0.1 : pr > 0.55 ? (0.7-pr)/0.15 : 1;
    const sc = pr < 0.3 ? eob((pr-0.15)/0.15) * 1.3 : 1;
    ctx.save();
    ctx.translate(cx, cy - 30);
    ctx.scale(sc, sc);
    ctx.globalAlpha = txtAlpha;
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 15;
    ctx.fillStyle = '#ee88ff';
    ctx.fillText('⚡ 分数互换 ⚡', 0, 0);
    ctx.restore();
  }
  // 全屏闪光
  if (pr < 0.2) {
    ctx.save();
    ctx.globalAlpha = (1 - pr/0.2) * 0.3;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W(), H());
    ctx.restore();
  }
}

// 音符轰炸：爆炸冲击波
function drawBombImpact(v, pr, alpha, ts) {
  const cx = v.toX, cy = v.toY;
  // 冲击波环
  if (pr < 0.5) {
    const ringPr = pr / 0.5;
    const radius = ringPr * 150;
    ctx.save();
    ctx.globalAlpha = (1 - ringPr) * 0.6;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = v.color1;
    ctx.lineWidth = 4 * (1 - ringPr);
    ctx.shadowColor = v.color1; ctx.shadowBlur = 15;
    ctx.stroke();
    ctx.restore();
  }
  // 抖动文字
  if (pr > 0.05 && pr < 0.5) {
    const shk = (1 - pr/0.5) * 5;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cx + (Math.random()-0.5)*shk, cy - 50 + (Math.random()-0.5)*shk);
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ff6644';
    ctx.fillText('💣 音符+2!', 0, 0);
    ctx.restore();
  }
}

// 疾风骤雨：速度线扫过
function drawSpeedImpact(v, pr, alpha, ts) {
  const vAx = v.victim.getAreaX(), vAw = v.victim.getAreaW();
  // 速度线
  ctx.save();
  ctx.globalAlpha = alpha * 0.5;
  const lineCount = 15;
  for (let i = 0; i < lineCount; i++) {
    const ly = 50 + (H()-100) * (i / lineCount) + Math.sin(ts*0.01+i)*15;
    const lx = vAx + pr * vAw * 1.5 - vAw * 0.3 + Math.sin(i*2)*20;
    const lw = 30 + Math.random()*60;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(lx + lw, ly);
    ctx.strokeStyle = Math.random() > 0.5 ? v.color1 : '#fff';
    ctx.lineWidth = 1.5 + Math.random()*2;
    ctx.shadowColor = v.color1; ctx.shadowBlur = 5;
    ctx.stroke();
  }
  ctx.restore();
  // 加速文字
  if (pr > 0.1 && pr < 0.6) {
    const txtAlpha = pr < 0.2 ? (pr-0.1)/0.1 : pr > 0.4 ? (0.6-pr)/0.2 : 1;
    ctx.save();
    ctx.globalAlpha = txtAlpha;
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#44ccff'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#88eeff';
    ctx.fillText('🌪️ 音轨加速!', v.victim.getCenterX(), v.victim.getBoardY() - 70);
    ctx.restore();
  }
}

// 暗箱操作：黑雾笼罩
function drawDebuffImpact(v, pr, alpha, ts) {
  const vAx = v.victim.getAreaX(), vAw = v.victim.getAreaW();
  // 黑雾
  ctx.save();
  const fogAlpha = alpha * 0.35;
  ctx.globalAlpha = fogAlpha;
  const g = ctx.createRadialGradient(v.victim.getCenterX(), H()/2, 0, v.victim.getCenterX(), H()/2, vAw*0.6);
  g.addColorStop(0, 'rgba(0,0,0,0.6)');
  g.addColorStop(0.5, 'rgba(20,0,30,0.3)');
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(vAx, 0, vAw, H());
  ctx.restore();
  // 减分标记
  if (pr > 0.1 && pr < 0.6) {
    const txtAlpha = pr < 0.2 ? (pr-0.1)/0.1 : pr > 0.4 ? (0.6-pr)/0.2 : 1;
    ctx.save();
    ctx.globalAlpha = txtAlpha;
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ff2244'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ff4466';
    ctx.fillText('🕳️ 得分-30%!', v.victim.getCenterX(), v.victim.getBoardY() - 70);
    ctx.restore();
  }
}

// 墨汁：墨水飞溅
function drawInkImpact(v, pr, alpha, ts) {
  const cx = v.toX, cy = v.toY;
  // 墨水溅射
  if (pr < 0.4) {
    const splashPr = pr / 0.4;
    ctx.save();
    ctx.globalAlpha = (1-splashPr) * 0.7;
    for (let i = 0; i < 8; i++) {
      const a = (Math.PI*2/8)*i + splashPr * 0.5;
      const r = splashPr * 80 + Math.sin(i*3)*15;
      const bx = cx + Math.cos(a)*r, by = cy + Math.sin(a)*r;
      ctx.beginPath();
      ctx.arc(bx, by, 6 + Math.random()*8, 0, Math.PI*2);
      ctx.fillStyle = '#111';
      ctx.shadowColor = '#000'; ctx.shadowBlur = 5;
      ctx.fill();
    }
    ctx.restore();
  }
  // 文字
  if (pr > 0.1 && pr < 0.6) {
    const txtAlpha = pr < 0.2 ? (pr-0.1)/0.1 : pr > 0.4 ? (0.6-pr)/0.2 : 1;
    ctx.save();
    ctx.globalAlpha = txtAlpha;
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#8844ff'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#aa66ff';
    ctx.fillText('🦑 墨汁遮挡!', v.victim.getCenterX(), v.victim.getBoardY() - 70);
    ctx.restore();
  }
}

// 干扰电波：电波扫描线
function drawEMPImpact(v, pr, alpha, ts) {
  const vAx = v.victim.getAreaX(), vAw = v.victim.getAreaW();
  const cx = v.victim.getCenterX();
  // 扫描线
  ctx.save();
  ctx.globalAlpha = alpha * 0.5;
  for (let i = 0; i < 6; i++) {
    const waveY = H() * ((pr * 2 + i * 0.15) % 1);
    ctx.beginPath();
    ctx.moveTo(vAx + 10, waveY);
    // 电波锯齿
    for (let x = vAx + 10; x < vAx + vAw - 10; x += 8) {
      ctx.lineTo(x, waveY + (Math.random() - 0.5) * 12);
    }
    ctx.strokeStyle = v.color1;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = v.color1; ctx.shadowBlur = 6;
    ctx.stroke();
  }
  ctx.restore();
  // 静电噪点
  if (alpha > 0.1) {
    ctx.save();
    ctx.globalAlpha = alpha * 0.15;
    for (let i = 0; i < 40; i++) {
      const x = vAx + Math.random() * vAw;
      const y = Math.random() * H();
      ctx.fillStyle = Math.random() > 0.5 ? '#44ff44' : '#aaffaa';
      ctx.fillRect(x, y, 2 + Math.random()*3, 1 + Math.random()*2);
    }
    ctx.restore();
  }
  // 文字
  if (pr > 0.1 && pr < 0.6) {
    const txtAlpha = pr < 0.2 ? (pr-0.1)/0.1 : pr > 0.4 ? (0.6-pr)/0.2 : 1;
    ctx.save();
    ctx.globalAlpha = txtAlpha;
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#44ff44'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#88ff88';
    ctx.fillText('📡 准确率降低!', cx, v.victim.getBoardY() - 70);
    ctx.restore();
  }
}

// 通用受害者警告效果：红色边框闪烁 + 警告图标
function drawVictimWarning(v, alpha, ts) {
  const vp = v.victim;
  const vAx = vp.getAreaX(), vAw = vp.getAreaW();
  // 红色边框闪烁
  const flashRate = Math.sin(ts * 0.02) * 0.5 + 0.5;
  ctx.save();
  ctx.globalAlpha = alpha * 0.4 * flashRate;
  ctx.strokeStyle = '#ff2244';
  ctx.lineWidth = 4;
  ctx.shadowColor = '#ff0033'; ctx.shadowBlur = 20;
  ctx.strokeRect(vAx + 2, 2, vAw - 4, H() - 4);
  ctx.restore();
  // 顶部红色渐变警告条
  ctx.save();
  ctx.globalAlpha = alpha * 0.6;
  const wg = ctx.createLinearGradient(vAx, 0, vAx, 40);
  wg.addColorStop(0, 'rgba(255,30,50,0.5)');
  wg.addColorStop(1, 'transparent');
  ctx.fillStyle = wg;
  ctx.fillRect(vAx, 0, vAw, 40);
  ctx.restore();
}

// ========== Utils ==========
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function eob(t){const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2)}

// ========== Start ==========
document.getElementById('startBtn').addEventListener('click',startGame);
requestAnimationFrame(gameLoop);
</script>
